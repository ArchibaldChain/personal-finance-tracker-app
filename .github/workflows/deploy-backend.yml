name: Deploy Backend

on:
  push:
    branches: [master]
    paths: [backend/**]      # only runs when backend files change

env:
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fintrack/backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: cd backend && uv sync --extra dev
      - name: Run backend tests
        run: cd backend && uv run pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud builds submit ./backend \
            --tag ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fintrack-backend \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}",\
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}",\
              JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}",\
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}",\
              CLASSIFICATION_ENABLED="${{ vars.CLASSIFICATION_ENABLED }}",\
              CLASSIFICATION_MODEL="${{ vars.CLASSIFICATION_MODEL }}",\
              JWT_EXPIRE_DAYS="${{ vars.JWT_EXPIRE_DAYS }}",\
              ALLOW_LOCAL_AUTH="${{ vars.ALLOW_LOCAL_AUTH }}",\
              CORS_ORIGINS="${{ vars.CORS_ORIGINS }}"
